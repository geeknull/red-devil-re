name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 GITHUB_TOKEN 部署 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个 Pages 部署，新推送取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 项目站点位于 /<repo>/ 子路径，故 base = /red-devil-re/；
      # 运行时资源 fetch 经 import.meta.env.BASE_URL 自动带上该前缀。
      - name: Build (web)
        run: pnpm --filter @red-devil/web exec vite build --base=/red-devil-re/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
